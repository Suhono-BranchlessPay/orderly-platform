<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Orderly AI — Menu from photo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F3EC;--ink:#16201A;--muted:#5E655D;--line:#E5E2D8;--green:#1E6A4F;--danger:#B4453C;--card:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--ink);padding:24px}
h1,h2{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em}
.wrap{max-width:960px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
label{display:block;font-size:13px;font-weight:700;margin:0 0 6px}
input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;margin-bottom:12px;background:#FCFBF8}
button{font:inherit;cursor:pointer;border:none;border-radius:999px;padding:10px 16px;font-weight:700;background:var(--green);color:#fff}
button.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
button:disabled{opacity:.5;cursor:not-allowed}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.row>*{flex:1;min-width:160px}
.warn{background:#FBEFD6;color:#9A6A12;padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:12px}
.err{color:var(--danger);font-weight:600;margin:8px 0}
table{width:100%;border-collapse:collapse}
th,td{border-top:1px solid var(--line);padding:8px;font-size:13px;vertical-align:top}
th{font-size:11px;text-transform:uppercase;color:var(--muted);text-align:left}
td input,td textarea,td select{margin:0}
.muted{color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Menu from photo</h1>
  <p class="muted" style="margin:6px 0 18px">AI draft only. Human review required before anything enters Orderly / Square.</p>

  <div class="card">
    <div class="warn">Never auto-publish. Approve pushes through Orderly Bridge only.</div>
    <div class="row">
      <div>
        <label for="tenant">Tenant ID</label>
        <input id="tenant" value="kirin" placeholder="kirin">
      </div>
      <div>
        <label for="token">Review token (optional)</label>
        <input id="token" type="password" placeholder="if ORDERLY_AI_REVIEW_TOKEN set">
      </div>
      <div>
        <label for="reviewer">Reviewed by</label>
        <input id="reviewer" placeholder="malik@orderlyfoods.com">
      </div>
    </div>
    <label for="file">Menu photo</label>
    <input id="file" type="file" accept="image/*">
    <div class="row">
      <button id="extractBtn" type="button">Extract draft</button>
      <button class="ghost" id="reloadBtn" type="button">Reload draft</button>
    </div>
    <div class="err" id="err"></div>
    <p class="muted" id="meta"></p>
  </div>

  <div class="card" id="draftCard" style="display:none">
    <h2 style="font-size:18px;margin-bottom:10px">Draft items</h2>
    <p class="muted" id="notes" style="margin-bottom:10px"></p>
    <table>
      <thead><tr><th>Use</th><th>Name</th><th>Category</th><th>Price $</th><th>Description</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="row" style="margin-top:14px">
      <label style="display:flex;align-items:center;gap:8px;font-weight:600"><input id="toSquare" type="checkbox"> Also publish to Square Catalog</label>
      <button id="approveBtn" type="button">Approve &amp; import to Orderly</button>
    </div>
  </div>
</div>
<script>
let draft = null;
const $ = (id) => document.getElementById(id);
function headers() {
  const h = {};
  const t = $('token').value.trim();
  if (t) h['X-Orderly-Review-Token'] = t;
  return h;
}
function showErr(m){ $('err').textContent = m || ''; }
function moneyFromCents(c){ return ((Number(c)||0)/100).toFixed(2); }
function centsFromMoney(s){ return Math.round(parseFloat(s||'0')*100) || 0; }

function render() {
  if (!draft) { $('draftCard').style.display='none'; return; }
  $('draftCard').style.display='block';
  $('meta').textContent = `Draft ${draft.id} · tenant ${draft.tenant_id} · status ${draft.status} · vision ${draft.vision_provider}`;
  $('notes').textContent = draft.notes || '';
  $('rows').innerHTML = (draft.items||[]).map((it, idx) => `
    <tr data-i="${idx}">
      <td><input type="checkbox" class="inc" ${it.include!==false?'checked':''}></td>
      <td><input class="name" value="${(it.name||'').replace(/"/g,'&quot;')}"></td>
      <td><input class="cat" value="${(it.category||'').replace(/"/g,'&quot;')}"></td>
      <td><input class="price" value="${moneyFromCents(it.price_cents)}"></td>
      <td><textarea class="desc" rows="2">${(it.description||'').replace(/</g,'&lt;')}</textarea></td>
    </tr>`).join('');
}

function collectItems() {
  return [...document.querySelectorAll('#rows tr')].map((tr) => ({
    name: tr.querySelector('.name').value.trim(),
    category: tr.querySelector('.cat').value.trim() || 'Uncategorized',
    price_cents: centsFromMoney(tr.querySelector('.price').value),
    description: tr.querySelector('.desc').value.trim() || null,
    include: tr.querySelector('.inc').checked,
    available: true,
    sku: null,
  })).filter(i => i.name);
}

$('extractBtn').onclick = async () => {
  showErr('');
  const file = $('file').files[0];
  if (!file) { showErr('Choose a photo'); return; }
  const fd = new FormData();
  fd.append('tenant_id', $('tenant').value.trim());
  fd.append('image', file);
  try {
    const res = await fetch('/v1/menu-from-photo', { method:'POST', body: fd, headers: headers() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
    draft = data.draft;
    render();
  } catch (e) { showErr(e.message); }
};

$('reloadBtn').onclick = async () => {
  if (!draft) return;
  showErr('');
  try {
    const res = await fetch('/v1/menu-drafts/' + draft.id, { headers: headers() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
    draft = data;
    render();
  } catch (e) { showErr(e.message); }
};

$('approveBtn').onclick = async () => {
  if (!draft) return;
  const reviewed_by = $('reviewer').value.trim();
  if (!reviewed_by) { showErr('Reviewed by is required'); return; }
  if (!confirm('Import reviewed items into Orderly now? This is the human gate.')) return;
  showErr('');
  try {
    const res = await fetch('/v1/menu-drafts/' + draft.id + '/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...headers() },
      body: JSON.stringify({
        reviewed_by,
        publish_to_square: $('toSquare').checked,
        items: collectItems(),
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
    alert('Imported: ' + (data.bridge && data.bridge.imported ? data.bridge.imported.length : '?') + ' items');
    draft.status = 'imported';
    render();
  } catch (e) { showErr(e.message); }
};
</script>
</body>
</html>
